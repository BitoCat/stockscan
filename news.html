<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StockScan · 市場新聞</title>
<link rel="stylesheet" href="css/base.css">
<style>
.cat-tabs { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:none; }
.cat-tabs::-webkit-scrollbar { display:none; }
.cat-tab { flex-shrink:0; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:20px; color:var(--muted); font-size:12px; font-family:'Noto Sans TC',sans-serif; padding:7px 16px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.cat-tab.active { background:rgba(0,212,255,.12); border-color:var(--accent); color:var(--accent); font-weight:600; }
.news-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; transition:all .2s; }
.news-card:hover { border-color:var(--border2); }
.news-meta { display:flex; align-items:center; gap:7px; margin-bottom:8px; flex-wrap:wrap; }
.news-source { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--accent); background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.2); border-radius:4px; padding:2px 8px; }
.news-date { font-size:10px; color:var(--muted); }
.news-lang { font-size:9px; padding:2px 6px; border-radius:3px; border:1px solid var(--border); color:var(--muted); }
.news-title { font-size:14px; font-weight:500; line-height:1.55; color:var(--text); margin-bottom:8px; }
.news-title a { color:inherit; text-decoration:none; }
.news-title a:hover { color:var(--accent); }
.ai-summary { background:rgba(0,212,255,.05); border:1px solid rgba(0,212,255,.15); border-radius:8px; padding:10px 12px; margin-top:8px; font-size:12px; color:var(--text); line-height:1.7; display:none; }
.ai-summary.show { display:block; }
.ai-btn { background:none; border:1px solid rgba(0,212,255,.3); border-radius:6px; color:var(--accent); font-size:11px; padding:4px 10px; cursor:pointer; transition:all .2s; font-family:'Noto Sans TC',sans-serif; }
.ai-btn:hover { background:rgba(0,212,255,.1); }
.news-foot { display:flex; align-items:center; justify-content:space-between; margin-top:8px; flex-wrap:wrap; gap:6px; }
.source-legend { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
.src-chip { font-size:10px; padding:3px 10px; border-radius:10px; border:1px solid var(--border); color:var(--muted); }
.refresh-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.last-update { font-size:11px; color:var(--muted); }
</style>
</head>
<body>
<nav class="topnav">
  <a class="logo" href="index.html"><span class="logo-main">STOCK<span>SCAN</span></span><span class="logo-ver">PRO</span></a>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="nav-plan" class="plan-badge plan-free">FREE</span>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">登出</button>
  </div>
</nav>
<div class="page-wrap">
  <div class="cat-tabs">
    <button class="cat-tab active" id="tab-macro" onclick="setTab('macro')">🌐 總經/Fed</button>
    <button class="cat-tab" id="tab-us" onclick="setTab('us')">🇺🇸 美股科技</button>
    <button class="cat-tab" id="tab-tw" onclick="setTab('tw')">🇹🇼 台股產業</button>
    <button class="cat-tab" id="tab-crypto" onclick="setTab('crypto')">₿ 加密貨幣</button>
  </div>
  <div class="refresh-bar">
    <span class="last-update" id="last-update">載入中...</span>
    <button class="btn btn-ghost btn-sm" onclick="loadNews(currentTab, true)">🔄 重新整理</button>
  </div>
  <div id="news-list"><div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">抓取最新新聞...</div></div></div>
</div>
<nav class="tabbar">
  <a class="tb" href="index.html"><span class="ti">🏠</span>首頁</a>
  <a class="tb" href="watchlist.html"><span class="ti">⭐</span>觀察名單</a>
  <a class="tb active" href="news.html"><span class="ti">📰</span>新聞</a>
  <a class="tb" href="profile.html"><span class="ti">👤</span>我的</a>
</nav>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
let cu = null, cp = null, currentTab = 'macro';
let newsCache = {};
let aiSummaries = {};

// RSS 來源設定
// Google News RSS - 不需要 CORS proxy，直接用 allorigins 抓
const GN = 'https://news.google.com/rss/search?hl=zh-TW&gl=TW&ceid=TW:zh-Hant&q=';
const GN_EN = 'https://news.google.com/rss/search?hl=en-US&gl=US&ceid=US:en&q=';

const RSS_SOURCES = {
  macro: [
    { name: 'Google財經', url: GN + encodeURIComponent('聯準會 Fed 降息 總經'), lang: '中' },
    { name: 'Google財經', url: GN + encodeURIComponent('美國經濟 通膨 利率'), lang: '中' },
    { name: 'Google News', url: GN_EN + encodeURIComponent('Federal Reserve interest rate inflation economy'), lang: 'EN' },
    { name: 'Google News', url: GN_EN + encodeURIComponent('GDP recession treasury yield'), lang: 'EN' },
  ],
  us: [
    { name: 'Google財經', url: GN + encodeURIComponent('美股 納斯達克 科技股 NVIDIA Apple'), lang: '中' },
    { name: 'Google財經', url: GN + encodeURIComponent('美股 S&P500 道瓊 財報'), lang: '中' },
    { name: 'Google News', url: GN_EN + encodeURIComponent('US stocks NASDAQ tech earnings NVIDIA Apple Microsoft'), lang: 'EN' },
    { name: 'Google News', url: GN_EN + encodeURIComponent('S&P500 Dow Jones stock market'), lang: 'EN' },
  ],
  tw: [
    { name: 'Google台股', url: GN + encodeURIComponent('台積電 台股 電子股'), lang: '中' },
    { name: 'Google台股', url: GN + encodeURIComponent('台灣股市 鴻海 聯發科 法說會'), lang: '中' },
    { name: 'Google台股', url: GN + encodeURIComponent('台股 外資 投信 買超 賣超'), lang: '中' },
    { name: 'Google台股', url: GN + encodeURIComponent('台灣半導體 AI伺服器 CoWoS'), lang: '中' },
  ],
  crypto: [
    { name: 'Google幣圈', url: GN + encodeURIComponent('比特幣 以太幣 加密貨幣'), lang: '中' },
    { name: 'Google幣圈', url: GN + encodeURIComponent('BTC ETH 幣安 虛擬貨幣'), lang: '中' },
    { name: 'Google Crypto', url: GN_EN + encodeURIComponent('Bitcoin Ethereum cryptocurrency crypto'), lang: 'EN' },
    { name: 'Google Crypto', url: GN_EN + encodeURIComponent('BTC ETH Binance blockchain'), lang: 'EN' },
  ]
};

const PROXY = 'https://api.allorigins.win/get?url=';
const PROXY2 = 'https://corsproxy.io/?';

(async () => {
  cu = await requireAuth();
  if (!cu) return;
  cp = await getProfile(cu.id);
  const nb = document.getElementById('nav-plan');
  nb.textContent = planLabel(cp?.plan || 'free');
  nb.className = 'plan-badge ' + planBadge(cp?.plan || 'free');
  await loadNews('macro');
})();

function setTab(tab) {
  currentTab = tab;
  ['macro','us','tw','crypto'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t === tab);
  });
  loadNews(tab);
}

async function loadNews(tab, force = false) {
  if (newsCache[tab] && !force) {
    renderNews(newsCache[tab]);
    return;
  }
  document.getElementById('news-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">抓取最新新聞...</div></div>';
  document.getElementById('last-update').textContent = '載入中...';

  const sources = RSS_SOURCES[tab];
  const allItems = [];

  await Promise.allSettled(sources.map(async (src) => {
    try {
      const items = await fetchRSS(src.url, src.name, src.lang);
      allItems.push(...items);
    } catch(e) {
      console.log('RSS 失敗:', src.name, e);
    }
  }));

  // 排序：最新優先
  allItems.sort((a, b) => new Date(b.date) - new Date(a.date));

  // 最多顯示30則
  const final = allItems.slice(0, 30);
  newsCache[tab] = final;

  const now = new Date().toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('last-update').textContent = `更新於 ${now}`;

  renderNews(final);
}

async function fetchRSS(url, sourceName, lang) {
  let xml = null;

  // 嘗試多個 proxy
  const proxies = [
    PROXY + encodeURIComponent(url),
    PROXY2 + encodeURIComponent(url),
  ];

  for (const proxy of proxies) {
    try {
      const r = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
      const data = await r.json();
      const content = data?.contents || data;
      if (typeof content === 'string' && content.includes('<item')) {
        xml = content;
        break;
      }
    } catch(e) { continue; }
  }

  if (!xml) return [];

  // 解析 XML
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = doc.querySelectorAll('item');
  const results = [];

  items.forEach((item, idx) => {
    if (idx >= 6) return; // 每個來源最多6則
    const title = item.querySelector('title')?.textContent?.trim() || '';
    const link = item.querySelector('link')?.textContent?.trim() ||
                 item.querySelector('link')?.getAttribute('href') || '#';
    const pubDate = item.querySelector('pubDate')?.textContent ||
                    item.querySelector('published')?.textContent || '';
    const desc = item.querySelector('description')?.textContent?.trim() || '';

    if (!title || title.length < 5) return;

    // 清除 HTML tags
    const cleanDesc = desc.replace(/<[^>]*>/g, '').trim().slice(0, 150);

    results.push({
      title: title.slice(0, 100),
      url: link,
      date: pubDate ? new Date(pubDate) : new Date(),
      source: sourceName,
      lang: lang,
      desc: cleanDesc,
    });
  });

  return results;
}

function renderNews(items) {
  const el = document.getElementById('news-list');
  if (!items || !items.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">暫無新聞，請稍後重試</div>';
    return;
  }
  el.innerHTML = items.map((n, idx) => {
    const ago = timeAgo(n.date);
    const langBadge = `<span class="news-lang">${n.lang}</span>`;
    const hasSummary = aiSummaries[idx];
    return `<div class="news-card">
      <div class="news-meta">
        <span class="news-source">${n.source}</span>
        ${langBadge}
        <span class="news-date">${ago}</span>
      </div>
      <div class="news-title"><a href="${n.url}" target="_blank" rel="noopener">${n.title}</a></div>
      ${n.desc ? `<div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px">${n.desc}</div>` : ''}
      <div id="ai-box-${idx}" class="ai-summary ${hasSummary ? 'show' : ''}">${hasSummary || ''}</div>
      <div class="news-foot">
        <button class="ai-btn" id="ai-btn-${idx}" onclick="getAISummary(${idx}, this)">
          ${hasSummary ? '✅ AI 摘要' : '🤖 AI 重點摘要'}
        </button>
        <a href="${n.url}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none">閱讀全文 →</a>
      </div>
    </div>`;
  }).join('');
}

async function getAISummary(idx, btn) {
  if (aiSummaries[idx]) {
    // 切換顯示/隱藏
    const box = document.getElementById('ai-box-' + idx);
    box.classList.toggle('show');
    return;
  }

  const key = getAIKey();
  if (!key) { showToast('請先設定 AI Key', 'error'); return; }

  btn.disabled = true;
  btn.textContent = '分析中...';

  const news = newsCache[currentTab][idx];
  const prompt = 'You are a financial news analyst. Summarize this news in Traditional Chinese with 3 key points. Be concise. Format: "• point1\n• point2\n• point3"\n\nTitle: ' + news.title + '\nContent: ' + (news.desc || news.title);

  try {
    const summary = await callAI(prompt, 300);
    aiSummaries[idx] = summary;
    const box = document.getElementById('ai-box-' + idx);
    box.innerHTML = '<strong style="color:var(--accent);font-size:11px">🤖 AI 重點</strong><br>' + summary.replace(/\n/g, '<br>');
    box.classList.add('show');
    btn.textContent = '✅ AI 摘要';
  } catch(e) {
    showToast('摘要失敗: ' + e.message, 'error');
    btn.textContent = '🤖 AI 重點摘要';
  }
  btn.disabled = false;
}

function timeAgo(date) {
  if (!date) return '—';
  const d = (Date.now() - new Date(date)) / 1000;
  if (d < 60) return '剛剛';
  if (d < 3600) return Math.floor(d/60) + '分鐘前';
  if (d < 86400) return Math.floor(d/3600) + '小時前';
  return Math.floor(d/86400) + '天前';
}
</script>
</body>
</html>
