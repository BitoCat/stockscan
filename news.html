<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060912">
<title>交易大師 · 新聞日報</title>
<link rel="stylesheet" href="css/base.css">
<style>
.report-header {
  background: linear-gradient(135deg, rgba(0,212,255,.08), rgba(155,89,182,.06));
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.report-title { font-size: 16px; font-weight: 700; color: #fff; }
.report-date { font-size: 12px; color: var(--muted); margin-top: 3px; }
.report-count { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--accent); }

.news-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  transition: border-color .2s;
  cursor: pointer;
}
.news-card:hover { border-color: var(--border2); }
.news-card:active { border-color: var(--accent); }

.news-meta {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.news-source {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  background: rgba(0,212,255,.08);
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 4px;
  padding: 2px 8px;
}
.news-date { font-size: 11px; color: var(--muted); }
.news-title {
  font-size: 15px;
  font-weight: 500;
  line-height: 1.6;
  color: var(--text);
}
.news-link {
  display: block;
  margin-top: 10px;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  opacity: .8;
}
.news-link:hover { opacity: 1; }

.mkt-tabs {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 16px;
}
.mkt-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 11px;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
}
.mkt-tab.active {
  background: var(--accent);
  color: #000;
}

.update-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.update-info { font-size: 12px; color: var(--muted); }
.refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all .2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 14px; }
.empty-state .title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.empty-state .hint { font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="logo" href="index.html"><span class="logo-main">交易<span>大師</span></span><span class="logo-ver">PRO</span></a>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="nav-plan" class="plan-badge plan-all">全市場</span>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">登出</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="sec-head">📰 新聞日報</div>

  <!-- 市場切換 -->
  <div class="mkt-tabs">
    <button class="mkt-tab active" id="tab-tw" onclick="switchMarket('tw')">🇹🇼 台股日報</button>
    <button class="mkt-tab" id="tab-us" onclick="switchMarket('us')">🇺🇸 美股日報</button>
  </div>

  <!-- 更新資訊 -->
  <div class="update-bar">
    <div class="update-info" id="update-info">載入中...</div>
    <button class="refresh-btn" onclick="loadNews(currentMarket, true)">↻ 重新整理</button>
  </div>

  <!-- 日報標頭 -->
  <div class="report-header" id="report-header" style="display:none">
    <div>
      <div class="report-title" id="report-title">交易大師台股日報</div>
      <div class="report-date" id="report-date"></div>
    </div>
    <div class="report-count" id="report-count"></div>
  </div>

  <!-- 新聞列表 -->
  <div id="news-list">
    <div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">載入日報中...</div></div>
  </div>
</div>

<nav class="tabbar">
  <a class="tb" href="index.html"><span class="ti">🏠</span>首頁</a>
  <a class="tb" href="watchlist.html"><span class="ti">⭐</span>觀察名單</a>
  <a class="tb active" href="news.html"><span class="ti">📰</span>新聞</a>
  <a class="tb" href="daily.html"><span class="ti">📊</span>盤面</a>
  <a class="tb" href="tracker.html"><span class="ti">🔭</span>追蹤</a>
  <a class="tb" href="alerts.html"><span class="ti">⚡</span>快訊</a>
  <a class="tb" href="profile.html"><span class="ti">👤</span>我的</a>
</nav>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://kldumnxdlgovaxtiszyn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsZHVtbnhkbGdvdmF4dGlzenluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjIyNDgsImV4cCI6MjA5MzY5ODI0OH0.P_anfYpSV2tgCPIQ7uZDVBjUFY3UhfEXk9u3XjlzBHI';
const SB_HEADERS = {
  'apikey': SUPABASE_ANON,
  'Authorization': 'Bearer ' + SUPABASE_ANON,
};

async function sbFetch(table, params = {}) {
  let url = SUPABASE_URL + '/rest/v1/' + table + '?';
  const qs = [];
  if (params.select) qs.push('select=' + encodeURIComponent(params.select));
  if (params.eq) for (const [k, v] of Object.entries(params.eq)) qs.push(k + '=eq.' + encodeURIComponent(v));
  if (params.order) for (const [col, asc] of params.order) qs.push('order=' + col + '.' + (asc ? 'asc' : 'desc'));
  if (params.limit) qs.push('limit=' + params.limit);
  url += qs.join('&');
  const resp = await fetch(url, { headers: SB_HEADERS });
  if (!resp.ok) return [];
  return await resp.json();
}

let cu = null, cp = null;
let currentMarket = 'tw';
let cache = { tw: null, us: null };

// 直接載入，不需要認證（新聞為公開內容）
loadNews('tw');

function switchMarket(market) {
  currentMarket = market;
  document.getElementById('tab-tw').classList.toggle('active', market === 'tw');
  document.getElementById('tab-us').classList.toggle('active', market === 'us');
  loadNews(market);
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 3600) return Math.floor(diff / 60) + ' 分鐘前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小時前';
  return Math.floor(diff / 86400) + ' 天前';
}

async function loadNews(market, force = false) {
  if (cache[market] && !force) {
    renderNews(cache[market], market);
    return;
  }

  document.getElementById('news-list').innerHTML =
    '<div class="spinner-wrap"><div class="spinner"></div><div class="spinner-txt">載入' +
    (market === 'tw' ? '台股' : '美股') + '日報中...</div></div>';
  document.getElementById('report-header').style.display = 'none';
  document.getElementById('update-info').textContent = '載入中...';

  try {
    const today = new Date().toISOString().slice(0, 10);
    // 先抓今天
    let data = await sbFetch('daily_news', {
      select: '*', eq: { market: market, report_date: today },
      order: [['published_at', false]], limit: 50
    });

    // 今天沒資料，抓最新一天
    if (!data || !data.length) {
      data = await sbFetch('daily_news', {
        select: '*', eq: { market: market },
        order: [['report_date', false], ['published_at', false]], limit: 50
      });
    }

    cache[market] = data || [];
    renderNews(cache[market], market);
  } catch (e) {
    document.getElementById('news-list').innerHTML =
      "<div class='empty-state'><div class='icon'>⚠️</div><div class='title'>載入失敗</div>" +
      "<div class='hint'>請稍後再試</div></div>";
    document.getElementById('update-info').textContent = '載入失敗';
  }
}

function renderNews(data, market) {
  const isZhTW = market === 'tw';
  const reportTitle = isZhTW ? '🇹🇼 交易大師台股日報' : '🇺🇸 交易大師美股日報';
  const now = new Date().toLocaleString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' });

  document.getElementById('update-info').textContent =
    '每日早上自動更新 · ' + new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });

  if (!data || !data.length) {
    document.getElementById('report-header').style.display = 'none';
    document.getElementById('news-list').innerHTML =
      "<div class='empty-state'>" +
      "<div class='icon'>⏳</div>" +
      "<div class='title'>今日日報準備中</div>" +
      "<div class='hint'>每日早上 7:30 自動更新<br>請稍後再來查看</div>" +
      "</div>";
    return;
  }

  // 取報告日期
  const reportDate = data[0]?.report_date || '';
  const dateLabel = reportDate
    ? new Date(reportDate + 'T00:00:00+08:00').toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })
    : now;

  document.getElementById('report-header').style.display = 'flex';
  document.getElementById('report-title').textContent = reportTitle;
  document.getElementById('report-date').textContent = dateLabel;
  document.getElementById('report-count').textContent = data.length + ' 則新聞';

  const container = document.getElementById('news-list');
  container.innerHTML = '';

  data.forEach(n => {
    const card = document.createElement('div');
    card.className = 'news-card';

    const ago = timeAgo(n.published_at);
    card.innerHTML =
      '<div class="news-meta">' +
        '<span class="news-source">' + (n.source || '未知來源') + '</span>' +
        '<span class="news-date">' + ago + '</span>' +
      '</div>' +
      '<div class="news-title">' + (n.title || '') + '</div>' +
      (n.url ? '<a class="news-link" href="' + n.url + '" target="_blank" rel="noopener">閱讀原文 →</a>' : '');

    if (n.url) {
      card.addEventListener('click', (e) => {
        if (e.target.tagName !== 'A') {
          window.open(n.url, '_blank', 'noopener');
        }
      });
    }
    container.appendChild(card);
  });
}
</script>
</body>
</html>
