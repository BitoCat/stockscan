<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060912">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="StockScan">
<title>StockScan · 首頁</title>
<link rel="stylesheet" href="css/base.css">
<style>
  .welcome-banner {
    background: linear-gradient(135deg, rgba(0,212,255,.08), rgba(155,89,182,.06));
    border: 1px solid rgba(0,212,255,.2);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .welcome-name { font-size: 15px; font-weight: 700; }
  .welcome-name span { color: var(--accent); }
  .plan-badge {
    font-family: 'Share Tech Mono',monospace; font-size: 10px; letter-spacing: 2px;
    padding: 4px 12px; border-radius: 20px; border: 1px solid;
  }
  .plan-free { border-color: var(--muted); color: var(--muted); }
  .plan-pro  { border-color: var(--warn);  color: var(--warn); background: rgba(243,156,18,.08); }
  .plan-admin{ border-color: var(--red);   color: var(--red);  background: rgba(231,76,60,.08); }

  .usage-bar-wrap { margin-bottom: 20px; }
  .usage-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .usage-bar-bg { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .usage-bar-fill { height: 100%; border-radius: 2px; transition: width .5s; }
  .fill-ok   { background: linear-gradient(90deg, var(--accent), var(--green)); }
  .fill-warn { background: linear-gradient(90deg, var(--warn), var(--red)); }

  /* Search */
  .search-card { padding: 18px; margin-bottom: 16px; }
  .mkt-grp { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 12px; width: fit-content; }
  .mbt { background: transparent; border: none; color: var(--muted); font-family: 'Noto Sans TC',sans-serif; font-size: 13px; padding: 9px 18px; cursor: pointer; transition: all .2s; }
  .mbt.active { background: var(--accent); color: #000; font-weight: 700; }
  .mbt:hover:not(.active) { color: var(--accent); }
  .inp-row { display: flex; gap: 8px; }
  .mono-inp {
    flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border);
    border-radius: 8px; color: #fff; font-family: 'Share Tech Mono',monospace;
    font-size: 16px; letter-spacing: 2px; padding: 10px 14px; outline: none; transition: all .2s;
  }
  .mono-inp::placeholder { color: var(--muted); font-size: 12px; letter-spacing: 1px; font-family: 'Noto Sans TC',sans-serif; }
  .mono-inp:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0,212,255,.15); }

  /* Result */
  .res-card { display: none; }
  .res-card.show { display: block; animation: fadeUp .35s ease; }
  .res-header {
    padding: 16px 18px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;
  }
  .sid { font-family: 'Bebas Neue',sans-serif; font-size: 36px; letter-spacing: 3px; color: #fff; line-height: 1; }
  .sname { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .ring-svg text { font-family: 'Bebas Neue',sans-serif; }

  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(120px,1fr)); gap: 1px; background: var(--border); }
  .met { background: var(--panel2); padding: 12px 14px; }
  .met-l { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .met-v { font-family: 'Share Tech Mono',monospace; font-size: 17px; color: #fff; }
  .met-v.up { color: var(--green); } .met-v.dn { color: var(--red); } .met-v.yw { color: var(--warn); }
  .met-s { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .analysis-section { padding: 16px 18px; }
  .signal-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .sig { display: flex; align-items: flex-start; gap: 9px; font-size: 13px; line-height: 1.5; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .dot.bull { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.bear { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .dot.neutral { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .ai-text { font-size: 13px; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
  .res-foot { padding: 10px 18px; background: rgba(0,0,0,.3); border-top: 1px solid var(--border); font-family: 'Share Tech Mono',monospace; font-size: 9px; color: var(--muted); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

  /* Watchlist mini */
  .wl-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .wl-row:last-child { border-bottom: none; }
  .wl-sym { font-family: 'Share Tech Mono',monospace; font-size: 15px; color: #fff; }
  .wl-name { font-size: 11px; color: var(--muted); }
  .wl-right { display: flex; align-items: center; gap: 10px; }
</style>
</head>
<body>

<nav class="topnav">
  <a class="logo" href="index.html">
    <span class="logo-main">STOCK<span>SCAN</span></span>
    <span class="logo-ver">PRO</span>
  </a>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="nav-plan" class="plan-badge plan-free">FREE</span>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">登出</button>
  </div>
</nav>

<div class="page-wrap">

  <!-- Welcome -->
  <div class="welcome-banner" id="welcome-banner">
    <div>
      <div class="welcome-name">歡迎回來，<span id="user-name">—</span> 👋</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px">今日市場分析已就緒</div>
    </div>
    <div id="banner-right"></div>
  </div>

  <!-- Usage bar (free only) -->
  <div class="usage-bar-wrap" id="usage-wrap" style="display:none">
    <div class="usage-label">
      <span>今日 AI 健診使用量</span>
      <span id="usage-txt">0 / 5</span>
    </div>
    <div class="usage-bar-bg">
      <div class="usage-bar-fill fill-ok" id="usage-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Search -->
  <div class="sec-head">🔍 AI 股票健診</div>
  <div class="card search-card">
    <div class="mkt-grp">
      <button class="mbt active" id="mbt-tw" onclick="setMkt('tw')">🇹🇼 台股</button>
      <button class="mbt" id="mbt-us" onclick="setMkt('us')">🇺🇸 美股</button>
    </div>
    <div class="inp-row">
      <input class="mono-inp" id="stock-inp" placeholder="輸入股票代號，如 2330 或 NVDA"
        onkeydown="if(event.key==='Enter')analyze()" />
      <button class="btn btn-primary" id="analyze-btn" onclick="analyze()">診斷</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
      <span class="chip-label" style="font-size:10px;color:var(--muted);align-self:center">熱門</span>
      <span class="chip" onclick="quickPick('2330','tw')">2330 台積電</span>
      <span class="chip" onclick="quickPick('2317','tw')">2317 鴻海</span>
      <span class="chip" onclick="quickPick('0050','tw')">0050</span>
      <span class="chip" onclick="quickPick('NVDA','us')">NVDA</span>
      <span class="chip" onclick="quickPick('AAPL','us')">AAPL</span>
      <span class="chip" onclick="quickPick('TSLA','us')">TSLA</span>
    </div>
  </div>

  <!-- Loading -->
  <div class="spinner-wrap" id="loading" style="display:none">
    <div class="spinner"></div>
    <div class="spinner-txt">AI 分析中...</div>
  </div>

  <!-- Error -->
  <div id="err-box" style="display:none;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:14px 18px;color:var(--red);font-size:13px;margin-bottom:16px;text-align:center"></div>

  <!-- Result -->
  <div class="card res-card" id="res-card">
    <div class="res-header">
      <div>
        <div class="sid" id="r-id"></div>
        <div class="sname" id="r-name"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div id="r-ring"></div>
        <div id="r-grade" class="grade g-hold"></div>
      </div>
    </div>
    <div class="metrics-grid" id="r-metrics"></div>
    <div class="analysis-section">
      <div class="sec-head">📡 關鍵信號</div>
      <div class="signal-list" id="r-signals"></div>
      <div class="sec-head">🧠 AI 深度分析</div>
      <div class="ai-text" id="r-analysis"></div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green btn-sm" id="save-btn" onclick="saveToWatchlist()">＋ 加入觀察名單</button>
      </div>
    </div>
    <div class="res-foot">
      <span id="r-time"></span>
      <span>⚠ 僅供參考，不構成投資建議</span>
    </div>
  </div>

  <!-- Watchlist preview -->
  <div style="margin-top:24px">
    <div class="sec-head" style="display:flex;justify-content:space-between;align-items:center">
      <span>⭐ 我的觀察名單</span>
      <a href="watchlist.html" style="font-size:11px;color:var(--accent);text-decoration:none">查看全部 →</a>
    </div>
    <div class="card" style="padding:14px 18px">
      <div id="wl-preview"><div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">加入股票後會顯示在這裡</div></div>
    </div>
  </div>

</div>

<!-- Bottom tab bar -->
<nav class="tabbar">
  <a class="tb active" href="index.html"><span class="ti">🏠</span>首頁</a>
  <a class="tb" href="watchlist.html"><span class="ti">⭐</span>觀察名單</a>
  <a class="tb" href="news.html"><span class="ti">📰</span>新聞</a>
  <a class="tb" href="profile.html"><span class="ti">👤</span>我的</a>
</nav>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
let currentUser = null, currentProfile = null, currentMkt = 'tw', lastResult = null;

// ── Init ──
(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getProfile(currentUser.id);
  
  // 每日自動補點
  const bonusGiven = await dailyBonus(currentUser.id);
  if (bonusGiven) showToast('🎁 每日登入補點 +100 點！', 'success');

  if (!currentProfile) {
    // Auto-create profile if missing (first login via Google etc.)
    await sb.from('profiles').upsert({
      id: currentUser.id,
      display_name: currentUser.user_metadata?.display_name || currentUser.email.split('@')[0],
      plan: currentUser.user_metadata?.plan || 'free',
      daily_count: 0,
      last_date: new Date().toDateString()
    });
    currentProfile = await getProfile(currentUser.id);
  }
  renderHeader();
  loadWatchlistPreview();
})();

function renderHeader() {
  const p = currentProfile;
  document.getElementById('user-name').textContent = p.display_name || '會員';
  const planEl = document.getElementById('nav-plan');
  planEl.textContent = p.plan === 'admin' ? 'ADMIN' : p.plan === 'pro' ? 'PRO' : 'FREE';
  planEl.className = 'plan-badge plan-' + p.plan;

  if (p.plan === 'free') {
    const used = getDailyCount();
    document.getElementById('usage-wrap').style.display = 'block';
    document.getElementById('usage-txt').textContent = used + ' / 5';
    const pct = (used / 5) * 100;
    const fill = document.getElementById('usage-fill');
    fill.style.width = pct + '%';
    fill.className = 'usage-bar-fill ' + (pct >= 80 ? 'fill-warn' : 'fill-ok');
  }
}

function getDailyCount() {
  const stored = JSON.parse(localStorage.getItem('daily') || '{"date":"","count":0}');
  const today = new Date().toDateString();
  if (stored.date !== today) { localStorage.setItem('daily', JSON.stringify({date:today,count:0})); return 0; }
  return stored.count;
}
function incDailyCount() {
  const today = new Date().toDateString();
  const c = getDailyCount() + 1;
  localStorage.setItem('daily', JSON.stringify({date:today, count:c}));
}

function setMkt(m) {
  currentMkt = m;
  document.getElementById('mbt-tw').classList.toggle('active', m==='tw');
  document.getElementById('mbt-us').classList.toggle('active', m==='us');
}
function quickPick(sym, mkt) { setMkt(mkt); document.getElementById('stock-inp').value = sym; analyze(); }

async function analyze() {
  const sym = document.getElementById('stock-inp').value.trim().toUpperCase();
  if (!sym) return;

  // Check points
  const pts = await getPoints(currentUser.id);
  if (pts < 1) {
    showErr('點數不足！請前往「點數」頁面儲值。');
    return;
  }

  const key = getAIKey();
  if (!key) { showErr('請先在「我的」頁面設定 AI Key，或聯絡管理員'); return; }

  toggleLoad(true);
  document.getElementById('res-card').classList.remove('show');
  hideErr();

  // 先抓即時股價（多proxy備援）
  let livePrice = null;
  let priceContext = '';
  try {
    const yahooSym = currentMkt === 'tw' ? sym + '.TW' : sym;
    const yahooUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${yahooSym}?interval=1d&range=5d&includePrePost=false`;
    const proxies = [
      `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`,
      `https://api.allorigins.win/get?url=${encodeURIComponent(yahooUrl)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yahooUrl)}`
    ];
    let pd = null;
    for (const proxyUrl of proxies) {
      try {
        const r = await fetch(proxyUrl, {signal: AbortSignal.timeout(5000)});
        const raw = await r.json();
        pd = raw?.contents ? JSON.parse(raw.contents) : raw;
        if (pd?.chart?.result?.[0]?.meta?.regularMarketPrice) break;
      } catch(e2) { continue; }
    }
    const meta = pd?.chart?.result?.[0]?.meta;
    if (meta?.regularMarketPrice) {
      const today = new Date();
      const dateStr = today.getFullYear() + '年' + (today.getMonth()+1) + '月' + today.getDate() + '日';
      livePrice = {
        name: meta.shortName || meta.longName || sym,
        price: meta.regularMarketPrice,
        high: meta.regularMarketDayHigh,
        low: meta.regularMarketDayLow,
        prev: meta.previousClose,
        changePct: (((meta.regularMarketPrice - meta.previousClose) / meta.previousClose) * 100).toFixed(2),
        date: dateStr
      };
      priceContext = `\n\n【即時股價資訊 ${dateStr} - 必須根據此資料分析】\n公司名稱：${livePrice.name}\n股票代號：${sym}\n目前股價：${livePrice.price}\n今日最高：${livePrice.high}\n今日最低：${livePrice.low}\n昨日收盤：${livePrice.prev}\n漲跌幅：${livePrice.changePct}%\n⚠️ 分析必須針對「${livePrice.name}」，支撐位壓力位須基於股價${livePrice.price}計算，資料時間為${dateStr}。`;
    } else {
      console.warn('所有proxy均失敗，使用AI估算');
    }
  } catch(e) { console.log('股價抓取失敗', e); }

  const market = currentMkt === 'tw' ? '台灣股市(台股)' : '美國股市(美股)';
  const companyHint = livePrice?.name ? `公司名稱是「${livePrice.name}」，` : '';
  const prompt = `你是頂級股票分析師，擁有20年經驗。${companyHint}請對${market}股票代號「${sym}」進行深度專業分析，僅輸出JSON，不含其他文字：
${priceContext}
\`\`\`json
{
  "stockName": "公司全名（必須正確）",
  "sector": "產業別",
  "healthScore": 75,
  "grade": "強力買進",
  "trend": "上升",
  "peRatio": "估計PE或N/A",
  "support": "支撐位（必須基於目前股價計算）",
  "resistance": "壓力位（必須基於目前股價計算）",
  "signals": [
    {"type":"bull","text":"具體多頭信號，含數據佐證"},
    {"type":"bear","text":"具體空頭風險，含數據佐證"},
    {"type":"neutral","text":"中性觀察重點"}
  ],
  "analysis": "請撰寫600-800字深度分析，結構如下：

【公司簡介】2-3句說明公司核心業務、市場地位、主要產品或服務。

【基本面分析】營收獲利趨勢、毛利率、負債比、現金流狀況、近期財報亮點或警訊。

【技術面分析】目前股價位置、趨勢方向、重要支撐壓力位、均線排列、成交量變化、是否有底部或頭部型態。

【產業與競爭地位】所屬產業景氣循環位置、與同業相比的競爭優勢或劣勢、市場份額變化。

【短中長期展望】短期（1-3個月）可能走勢、中期（3-12個月）催化劑或風險事件、長期（1-3年）成長邏輯。

【投資風險提示】列出3項具體風險，包含總體經濟、產業、公司個別風險。

末尾加：⚠ 資料參考時間：約[年份]，本分析僅供參考。"
}
\`\`\`
grade限：強力買進、買進、谷底反彈機會、觀察等待、持有、減碼、避開
注意：analysis必須是600字以上的繁體中文深度分析，不可敷衍簡短。`;

  try {
    const raw = await callAI(prompt, 1000);
    const m = raw.match(/```json\s*([\s\S]*?)\s*```/);
    const obj = JSON.parse(m ? m[1] : raw);
    // 把即時股價加進結果
    if (livePrice?.price) {
      obj.currentPrice = livePrice.price;
      obj.changePct = livePrice.changePct;
      obj.stockName = livePrice.name;
    }
    lastResult = { ...obj, symbol: sym, market: currentMkt };
    await deductPoint(currentUser.id, `AI 健診：${sym}`);
    renderResult(sym, obj);
    const newPts = await getPoints(currentUser.id);
    document.getElementById('pts-display') && (document.getElementById('pts-display').textContent = newPts + ' 點');
  } catch(e) {
    showErr('分析失敗：' + e.message);
  }
  toggleLoad(false);
}

function renderResult(sym, d) {
  document.getElementById('r-id').textContent = sym;
  document.getElementById('r-name').textContent = (d.stockName||'') + (d.sector ? ' · '+d.sector : '');

  const score = parseInt(d.healthScore)||50;
  const color = score>=75?'#2ecc71':score>=50?'#00d4ff':score>=35?'#f39c12':'#e74c3c';
  const r=34, circ=2*Math.PI*r, dash=(score/100)*circ;
  document.getElementById('r-ring').innerHTML = `<svg width="84" height="84" viewBox="0 0 84 84" class="ring-svg">
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="#1c2d50" stroke-width="6"/>
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="${color}" stroke-width="6"
      stroke-dasharray="${dash} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"
      style="filter:drop-shadow(0 0 6px ${color})"/>
    <text x="42" y="44" text-anchor="middle" dominant-baseline="middle" font-size="20" fill="white">${score}</text>
    <text x="42" y="57" text-anchor="middle" font-family="'Share Tech Mono',monospace" font-size="7" fill="#4a6080">HEALTH</text>
  </svg>`;

  const grade = d.grade||'—';
  const gEl = document.getElementById('r-grade');
  gEl.textContent = grade;
  gEl.className = 'grade ' + gradeClass(grade);

  const mets = [
    {l:'趨勢', v: d.trend||'—', c: d.trend?.includes('上')?'up':d.trend?.includes('下')?'dn':''},
    {l: d.currentPrice?'即時股價':'本益比', v: d.currentPrice ? String(d.currentPrice) : (d.peRatio||'—'), c: d.changePct>0?'up':d.changePct<0?'dn':'', s: d.currentPrice ? (d.changePct>0?'▲':'▼')+d.changePct+'%' : '估計值'},
    {l:'支撐位', v: d.support||'—', c:'up', s:'參考'},
    {l:'壓力位', v: d.resistance||'—', c:'dn', s:'參考'},
  ];
  document.getElementById('r-metrics').innerHTML = mets.map(m=>
    `<div class="met"><div class="met-l">${m.l}</div><div class="met-v ${m.c}">${m.v}</div>${m.s?`<div class="met-s">${m.s}</div>`:''}</div>`).join('');

  document.getElementById('r-signals').innerHTML = (d.signals||[]).map(s=>
    `<div class="sig"><div class="dot ${s.type}"></div><span>${s.text}</span></div>`).join('');
  document.getElementById('r-analysis').textContent = d.analysis||'';
  document.getElementById('r-time').textContent = '診斷：' + new Date().toLocaleString('zh-TW');
  document.getElementById('res-card').classList.add('show');
  document.getElementById('res-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function gradeClass(g) {
  if (g.includes('強力買進')||g.includes('買進')) return 'g-buy';
  if (g.includes('谷底')) return 'g-rebound';
  if (g.includes('觀察')) return 'g-watch';
  if (g.includes('持有')) return 'g-hold';
  return 'g-avoid';
}

async function saveToWatchlist() {
  if (!lastResult) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  const { error } = await sb.from('watchlist').upsert({
    user_id: currentUser.id,
    symbol: lastResult.symbol,
    market: lastResult.market,
    name: lastResult.stockName,
    sector: lastResult.sector,
    grade: lastResult.grade,
    health_score: lastResult.healthScore,
    added_at: new Date().toISOString()
  }, { onConflict: 'user_id,symbol' });
  if (error) { showToast('❌ 儲存失敗', 'error'); btn.disabled=false; }
  else { showToast('✅ 已加入觀察名單', 'success'); loadWatchlistPreview(); }
}

async function loadWatchlistPreview() {
  if (!currentUser) return;
  const { data } = await sb.from('watchlist').select('*').eq('user_id', currentUser.id).order('added_at',{ascending:false}).limit(3);
  const el = document.getElementById('wl-preview');
  if (!data || !data.length) { el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">尚無觀察股票</div>'; return; }
  el.innerHTML = data.map(w => `<div class="wl-row">
    <div><div class="wl-sym">${w.symbol}</div><div class="wl-name">${w.name||''}</div></div>
    <div class="wl-right">
      <span class="grade ${gradeClass(w.grade||'')} " style="font-size:11px;padding:3px 10px">${w.grade||'—'}</span>
    </div>
  </div>`).join('');
}

function toggleLoad(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('analyze-btn').disabled = on;
}
function showErr(msg) { const e=document.getElementById('err-box'); e.textContent=msg; e.style.display='block'; }
function hideErr() { document.getElementById('err-box').style.display='none'; }
function showToast(msg, type='') { const t=document.getElementById('toast'); t.textContent=msg; t.className='show '+type; setTimeout(()=>t.className='',2800); }
</script>
</body>
</html>
