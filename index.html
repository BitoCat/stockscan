<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060912">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="交易大師">
<title>交易大師 · 首頁</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/base.css">
<style>
.welcome-banner { background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(155,89,182,.06)); border:1px solid rgba(0,212,255,.2); border-radius:12px; padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.welcome-name { font-size:15px; font-weight:700; }
.welcome-name span { color:var(--accent); }
.section-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; }
.section-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.section-title { font-size:13px; font-weight:700; }
.section-more { font-size:11px; color:var(--accent); text-decoration:none; }
.item-row { padding:10px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit; transition:background .2s; }
.item-row:last-child { border-bottom:none; }
.item-row:hover { background:rgba(255,255,255,.03); }
.item-icon { font-size:18px; flex-shrink:0; }
.item-title { font-size:13px; line-height:1.4; flex:1; }
.item-meta { font-size:10px; color:var(--muted); flex-shrink:0; }
.item-badge { font-size:10px; padding:2px 7px; border-radius:6px; flex-shrink:0; }
.badge-bull { background:rgba(46,204,113,.15); color:var(--green); }
.badge-bear { background:rgba(231,76,60,.15); color:var(--red); }
.badge-neutral { background:rgba(255,255,255,.08); color:var(--muted); }
.quick-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.quick-btn { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; text-decoration:none; color:inherit; text-align:center; transition:all .2s; }
.quick-btn:hover { border-color:var(--accent); }
.quick-btn .qi { font-size:28px; margin-bottom:6px; }
.quick-btn .ql { font-size:13px; font-weight:600; }
.quick-btn .qd { font-size:11px; color:var(--muted); margin-top:2px; }
.free-banner { background:rgba(243,156,18,.06); border:1px solid rgba(243,156,18,.3); border-radius:12px; padding:16px; margin-bottom:16px; text-align:center; }
</style>
<script>
// 清除舊的 Service Worker 快取
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(registrations) {
    for(let registration of registrations) {
      registration.unregister();
    }
  });
  caches.keys().then(function(cacheNames) {
    cacheNames.forEach(function(cacheName) {
      caches.delete(cacheName);
    });
  });
}
</script>
</head>
<body>
<nav class="topnav">
  <a class="logo" href="index.html">
    <span class="logo-main">交易<span>大師</span></span>
    <span class="logo-ver">PRO</span>
  </a>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="nav-plan" class="plan-badge plan-free">FREE</span>
    <button class="btn btn-ghost btn-sm" onclick="signOut()">登出</button>
  </div>
</nav>

<div class="page-wrap">
  <!-- Welcome -->
  <div class="welcome-banner">
    <div>
      <div class="welcome-name">歡迎回來，<span id="user-name">—</span> 👋</div>
      <div style="font-size:12px;color:var(--muted);margin-top:3px" id="user-sub">載入中...</div>
    </div>
    <div id="pts-area"></div>
  </div>

  <!-- 免費用戶引導 -->
  <div id="free-guide" style="display:none">
    <div class="free-banner">
      <div style="font-size:14px;font-weight:700;margin-bottom:8px">🔒 您的帳號尚未開通</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.7">請聯繫管理員申請 Groq Key 並開通帳號<br>開通後即可使用所有功能</div>
      <a href="contact.html" class="btn btn-primary btn-sm" style="text-decoration:none">✉️ 聯繫管理員開通</a>
    </div>
  </div>

  <!-- 快速入口 -->
  <div class="quick-btns" id="quick-btns" style="display:none">
    <a href="diagnosis.html" class="quick-btn">
      <div class="qi">🔍</div>
      <div class="ql">AI 股票健診</div>
      <div class="qd">即時技術分析</div>
    </a>
    <a href="daily.html" class="quick-btn">
      <div class="qi">📊</div>
      <div class="ql">每日盤面解析</div>
      <div class="qd">專業市場分析</div>
    </a>
    <a href="watchlist.html" class="quick-btn">
      <div class="qi">⭐</div>
      <div class="ql">觀察名單</div>
      <div class="qd">追蹤心儀股票</div>
    </a>
    <a href="tutorial.html" class="quick-btn">
      <div class="qi">📚</div>
      <div class="ql">投資教學</div>
      <div class="qd">提升交易技巧</div>
    </a>
  </div>

  <!-- 最新公告 -->
  <div class="section-card" id="sec-announce" style="display:none">
    <div class="section-header">
      <div class="section-title">📢 最新公告</div>
      <a href="announcement.html" class="section-more">查看全部 →</a>
    </div>
    <div id="list-announce"><div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">載入中...</div></div>
  </div>

  <!-- 最新盤面解析 -->
  <div class="section-card" id="sec-daily" style="display:none">
    <div class="section-header">
      <div class="section-title">📊 最新盤面解析</div>
      <a href="daily.html" class="section-more">查看全部 →</a>
    </div>
    <div id="list-daily"><div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">載入中...</div></div>
  </div>

  <!-- 精選新聞 -->
  <div class="section-card" id="sec-news" style="display:none">
    <div class="section-header">
      <div class="section-title">📰 精選新聞</div>
      <a href="news.html" class="section-more">查看全部 →</a>
    </div>
    <div id="list-news"><div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">載入中...</div></div>
  </div>

  <!-- 精選教學 -->
  <div class="section-card" id="sec-tutorial" style="display:none">
    <div class="section-header">
      <div class="section-title">📚 精選教學</div>
      <a href="tutorial.html" class="section-more">查看全部 →</a>
    </div>
    <div id="list-tutorial"><div style="padding:16px;font-size:12px;color:var(--muted);text-align:center">載入中...</div></div>
  </div>

</div>

<nav class="tabbar">
  <a class="tb active" href="index.html"><span class="ti">🏠</span>首頁</a>
  <a class="tb" href="diagnosis.html"><span class="ti">🔍</span>健診</a>
  <a class="tb" href="daily.html"><span class="ti">📊</span>盤面</a>
  <a class="tb" href="news.html"><span class="ti">📰</span>新聞</a>
  <a class="tb" href="contact.html"><span class="ti">✉️</span>管理員</a>
</nav>

<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
let currentUser = null, currentProfile = null;

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  // 強制從 DB 抓最新 profile
  currentProfile = null;
  currentProfile = await getProfile(currentUser.id);
  console.log('profile loaded:', currentProfile?.plan, currentProfile?.groq_key?.slice(0,10));
  if (!currentProfile) {
    await sb.from('profiles').insert({ id: currentUser.id, display_name: currentUser.user_metadata?.display_name || currentUser.email.split('@')[0], plan: 'free', daily_count: 0, last_date: new Date().toDateString() }).then(() => {}).catch(() => {});
    currentProfile = await getProfile(currentUser.id);
  }
  // 再抓一次確保是最新資料
  currentProfile = await getProfile(currentUser.id);
  const bonusGiven = await dailyBonus(currentUser.id);
  if (bonusGiven) showToast('🎁 每日登入補點 +100 點！', 'success');
  renderHeader();
  loadContent();
})();

function renderHeader() {
  const p = currentProfile;
  document.getElementById('user-name').textContent = p.display_name || '會員';
  const nb = document.getElementById('nav-plan');
  nb.textContent = planLabel(p.plan || 'free');
  nb.className = 'plan-badge ' + planBadge(p.plan || 'free');
  if (p.plan === 'free') {
    document.getElementById('user-sub').textContent = '免費會員・聯繫管理員開通功能';
    document.getElementById('free-guide').style.display = 'block';
  } else {
    document.getElementById('user-sub').textContent = '今日市場資訊已就緒';
    document.getElementById('quick-btns').style.display = 'grid';
    getPoints(currentUser.id).then(pts => {
      document.getElementById('pts-area').innerHTML = '<div style="font-family:Share Tech Mono,monospace;font-size:14px;color:var(--accent)">' + pts + ' <span style="font-size:10px;color:var(--muted)">點</span></div>';
    });
  }
}

async function loadContent() {
  if (currentProfile?.plan === 'free') return;

  // 公告
  const annRes = await sb.from('announcements').select('*').eq('show_on_home', true).order('is_pinned', {ascending:false}).order('published_at', {ascending:false}).limit(3);
  if (annRes.data?.length) {
    document.getElementById('sec-announce').style.display = 'block';
    document.getElementById('list-announce').innerHTML = annRes.data.map(a =>
      "<a href='announcement.html' class='item-row'>" +
      "<div class='item-icon'>" + (a.is_pinned ? '📌' : '📢') + "</div>" +
      "<div class='item-title'>" + a.title + "</div>" +
      "<div class='item-meta'>" + timeAgo(a.published_at) + "</div>" +
      "</a>"
    ).join('');
  }

  // 盤面解析
  const dailyRes = await sb.from('daily_analysis').select('*').eq('show_on_home', true).order('published_at', {ascending:false}).limit(3);
  if (dailyRes.data?.length) {
    document.getElementById('sec-daily').style.display = 'block';
    document.getElementById('list-daily').innerHTML = dailyRes.data.map(d =>
      "<a href='daily.html' class='item-row'>" +
      "<div class='item-icon'>" + (d.sentiment==='bull'?'📈':d.sentiment==='bear'?'📉':'📊') + "</div>" +
      "<div class='item-title'>" + d.title + "</div>" +
      "<div class='item-meta'>" + timeAgo(d.published_at) + "</div>" +
      "</a>"
    ).join('');
  }

  // 新聞
  const newsRes = await sb.from('news').select('*').eq('show_on_home', true).order('published_at', {ascending:false}).limit(4);
  if (newsRes.data?.length) {
    document.getElementById('sec-news').style.display = 'block';
    document.getElementById('list-news').innerHTML = newsRes.data.map(n =>
      "<a href='news.html' class='item-row'>" +
      "<div class='item-icon'>" + (n.sentiment==='bull'?'📈':n.sentiment==='bear'?'📉':'📰') + "</div>" +
      "<div class='item-title'>" + n.title + "</div>" +
      "<div class='item-badge badge-" + (n.sentiment||'neutral') + "'>" + (n.sentiment==='bull'?'偏多':n.sentiment==='bear'?'偏空':'中性') + "</div>" +
      "</a>"
    ).join('');
  }

  // 教學
  const tutRes = await sb.from('tutorials').select('*').eq('show_on_home', true).order('published_at', {ascending:false}).limit(3);
  if (tutRes.data?.length) {
    document.getElementById('sec-tutorial').style.display = 'block';
    document.getElementById('list-tutorial').innerHTML = tutRes.data.map(t =>
      "<a href='tutorial.html' class='item-row'>" +
      "<div class='item-icon'>" + (t.cover_emoji||'📚') + "</div>" +
      "<div class='item-title'>" + t.title + "</div>" +
      "<div class='item-meta'>" + timeAgo(t.published_at) + "</div>" +
      "</a>"
    ).join('');
  }
}

function timeAgo(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 3600) return Math.floor(d/60) + '分鐘前';
  if (d < 86400) return Math.floor(d/3600) + '小時前';
  return Math.floor(d/86400) + '天前';
}

// 每30秒檢查 profile 是否有更新（讓升級立即生效）
setInterval(async () => {
  if (!currentUser) return;
  const fresh = await getProfile(currentUser.id);
  if (fresh && fresh.plan !== currentProfile?.plan) {
    currentProfile = fresh;
    renderHeader();
    loadContent();
    showToast("帳號已升級，功能已開啟！", "success");
  }
}, 30000);

function showToast(msg, type) {
  type = type || '';
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(function() { t.className = ''; }, 2800);
}
</script>
</body>
</html>
