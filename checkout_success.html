<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060912">
<title>交易大師 · 付款完成</title>
<link rel="stylesheet" href="css/base.css">
<style>
.success-wrap { max-width: 480px; margin: 0 auto; padding: 60px 16px; text-align: center; }
.success-icon { font-size: 64px; margin-bottom: 24px; }
.success-title { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.success-desc { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 32px; }
.steps { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; }
.step { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.step:last-child { border-bottom: none; }
.step-num { background: var(--accent); color: #000; font-weight: 700; font-size: 12px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-text { font-size: 13px; color: var(--text); line-height: 1.6; }
.step-text b { color: var(--accent); }
.btn-home { display: inline-block; background: var(--accent); color: #000; font-weight: 700; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-size: 15px; }
.atm-notice { background: rgba(255,200,0,.08); border: 1px solid rgba(255,200,0,.3); border-radius: 12px; padding: 16px; margin-bottom: 24px; font-size: 13px; color: var(--warn); line-height: 1.6; display: none; }
</style>
</head>
<body>
<div class="success-wrap">
  <div class="success-icon">🎉</div>
  <div class="success-title">付款資訊已送出！</div>
  <div class="success-desc">
    感謝您加入交易大師會員！<br>
    請依以下步驟完成開通
  </div>

  <div class="atm-notice" id="atm-notice">
    ⚠️ <b>ATM／超商付款提醒</b><br>
    請至銀行 ATM 或超商完成付款後，系統才會自動開通您的帳號。
    付款完成後請稍等幾分鐘，再至 Telegram 找 @Boss1688Bot 開通頻道。
  </div>

  <div class="steps">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px">📋 開通步驟</div>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">打開 Telegram，搜尋 <b>@Boss1688Bot</b></div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">點擊 Start 或輸入 <b>/start</b></div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">輸入您<b>付款時填寫的 Email</b></div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-text">Bot 自動發送三個頻道邀請連結，點擊加入即可！</div>
    </div>
  </div>

  <a href="index.html" class="btn-home">回到交易大師首頁</a>
</div>

<script>
// 如果是 ATM 或超商付款，顯示提醒
const params = new URLSearchParams(window.location.search);
const paymentType = params.get('payment_type');
if (paymentType === 'ATM' || paymentType === 'CVS' || paymentType === 'BARCODE') {
  document.getElementById('atm-notice').style.display = 'block';
}
</script>
</body>
</html>
