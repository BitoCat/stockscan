<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易大師 · 主力雷達</title>
<link rel="stylesheet" href="css/base.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── 完全沿用 whale.html 的設計語言 ── */
:root{--bg:#060912;--bg2:#0d1220;--bg3:#131929;--border:#1e2a40;--text:#e2e8f0;--muted:#64748b;--accent:#f5a623;--amber:#d97706;--amber-light:#fcd34d;--teal:#0d9488;--teal-light:#5eead4;--coral:#f97316;--coral-light:#fdba74;--trust:#14b8a6;--trust-light:#5eead4;--foreign:#a78bfa;--foreign-light:#c4b5fd;--both:#f97316;--both-light:#fdba74;--green:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;padding-bottom:80px;}

/* ── Header ── */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;}
.header h1{font-size:17px;font-weight:600;}
.hbadge{background:var(--amber);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}

/* ── Tabs ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;}
.tab{padding:12px 18px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--amber-light);border-bottom-color:var(--amber);}

/* ── Filter chips ── */
.filter-bar{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border);}
.filter-bar::-webkit-scrollbar{display:none;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;}
.chip.active{border-color:var(--amber);color:var(--amber-light);background:rgba(217,119,6,.15);}

/* ── Section ── */
.section{padding:12px 16px;}
.section-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;margin-bottom:10px;text-transform:uppercase;}

/* ── Stats row ── */
.stats-row{display:flex;gap:8px;margin-top:10px;}
.stat{flex:1;background:var(--bg3);border-radius:8px;padding:8px 10px;text-align:center;}
.stat .val{font-size:16px;font-weight:700;color:var(--text);}
.stat .lbl{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;}
.card:hover{border-color:var(--amber);}
.card.trust-new{border-left:3px solid var(--trust);}
.card.foreign-acc{border-left:3px solid var(--foreign);}
.card.both-signal{border-left:3px solid var(--both);}
.card.normal{border-left:3px solid var(--border);}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.card-ticker{font-size:18px;font-weight:700;color:var(--text);}
.card-name{font-size:12px;color:var(--muted);margin-top:2px;}
.card-value{text-align:right;}
.card-value .mv{font-size:15px;font-weight:600;color:var(--teal-light);}
.card-value .qt{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── Source tags ── */
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tag-trust{background:rgba(20,184,166,.2);color:var(--trust-light);border:1px solid rgba(20,184,166,.3);border-radius:6px;padding:2px 8px;font-size:11px;}
.tag-foreign{background:rgba(167,139,250,.2);color:var(--foreign-light);border:1px solid rgba(167,139,250,.3);border-radius:6px;padding:2px 8px;font-size:11px;}
.tag-more{background:rgba(217,119,6,.2);color:var(--amber-light);border:1px solid rgba(217,119,6,.3);border-radius:6px;padding:2px 8px;font-size:11px;}

/* ── Badges ── */
.badge-new{background:rgba(20,184,166,.2);color:var(--trust-light);border:1px solid rgba(20,184,166,.3);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:500;}
.badge-foreign{background:rgba(167,139,250,.2);color:var(--foreign-light);border:1px solid rgba(167,139,250,.3);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:500;}
.badge-both{background:rgba(249,115,22,.2);color:var(--both-light);border:1px solid rgba(249,115,22,.3);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:500;}

/* ── Progress ── */
.progress-wrap{margin-top:6px;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width .4s;}
.fill-trust{background:var(--trust);}
.fill-foreign{background:var(--foreign);}
.fill-both{background:var(--both);}

/* ── Source indicator dot ── */
.source-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;}
.dot-trust{background:var(--trust);}
.dot-foreign{background:var(--foreign);}
.dot-both{background:var(--both);}

/* ── Fund list in tab2 ── */
.fund-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;}
.fund-row:hover{border-color:var(--amber);}

/* ── Misc ── */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .icon{font-size:36px;margin-bottom:10px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>

  <div>

<script>
const SUPABASE_URL = 'https://kldumnxdlgovaxtiszyn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtsZHVtbnhkbGdvdmF4dGlzenluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjIyNDgsImV4cCI6MjA5MzY5ODI0OH0.P_anfYpSV2tgCPIQ7uZDVBjUFY3UhfEXk9u3XjlzBHI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let allNewPositions = [];
let allFundPositions = [];
let currentFilter = 'all';

/* ══════════════════════════════════════════
   Tab 切換
══════════════════════════════════════════ */
function switchTab(n) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-btn-' + n).classList.add('active');
  document.getElementById('tab-' + n).classList.add('active');
}
document.getElementById('tab-btn-new').addEventListener('click', () => switchTab('new'));
document.getElementById('tab-btn-all').addEventListener('click', () => switchTab('all'));
document.getElementById('tab-btn-funds').addEventListener('click', () => switchTab('funds'));

/* ══════════════════════════════════════════
   篩選
══════════════════════════════════════════ */
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('#tab-new .chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + f).classList.add('active');
  renderNewPositions(allNewPositions);
}
['all','trust','foreign','both','multi','pct1',
 'sector-tech','sector-fin','sector-trad','sector-bio'].forEach(f => {
  document.getElementById('chip-' + f).addEventListener('click', () => setFilter(f));
});

/* ══════════════════════════════════════════
   Tab 1：新建倉
══════════════════════════════════════════ */
async function loadNewPositions() {
  const { data, error } = await sb
    .from('tw_radar_new_positions')
    .select('*')
    .order('fund_count', { ascending: false })
    .order('total_value', { ascending: false })
    .limit(500);

  if (error || !data || !data.length) {
    document.getElementById('new-positions-list').innerHTML =
      '<div class="empty"><div class="icon">🎯</div><div>暫無資料，請等待每月掃描</div></div>';
    return;
  }

  allNewPositions = data;

  // 取最新月份
  const months = [...new Set(data.map(d => d.year_month))].sort().reverse();
  const latest = data.filter(d => d.year_month === months[0]);
  const ym = months[0];
  const ymLabel = ym ? ym.slice(0,4) + '/' + ym.slice(4,6) : '';

  document.getElementById('stat-new').textContent = latest.length;
  document.getElementById('stat-trust').textContent = latest.filter(d => d.source === '投信').length;
  document.getElementById('stat-foreign').textContent = latest.filter(d => d.source === '外資').length;
  document.getElementById('month-label').textContent = '最新月份：' + ymLabel;
  document.getElementById('last-updated').textContent = '資料月份：' + ymLabel;

  renderNewPositions(data);
}

function renderNewPositions(data) {
  const months = [...new Set(data.map(d => d.year_month))].sort().reverse();
  let filtered = data.filter(d => d.year_month === months[0]);

  // 篩選邏輯
  if (currentFilter === 'trust')   filtered = filtered.filter(d => d.source === '投信');
  if (currentFilter === 'foreign') filtered = filtered.filter(d => d.source === '外資');
  if (currentFilter === 'both') {
    // 同一 ticker 同時出現投信與外資
    const tickers = new Set(
      filtered.filter(d => d.source === '投信').map(d => d.ticker)
    );
    filtered = filtered.filter(d => tickers.has(d.ticker));
  }
  if (currentFilter === 'multi')  filtered = filtered.filter(d => d.fund_count >= 2);
  if (currentFilter === 'pct1')   filtered = filtered.filter(d => d.avg_pct >= 1);
  if (currentFilter === 'sector-tech') filtered = filtered.filter(d => isTech(d));
  if (currentFilter === 'sector-fin')  filtered = filtered.filter(d => isFin(d));
  if (currentFilter === 'sector-trad') filtered = filtered.filter(d => isTrad(d));
  if (currentFilter === 'sector-bio')  filtered = filtered.filter(d => isBio(d));

  if (!filtered.length) {
    document.getElementById('new-positions-list').innerHTML =
      '<div class="empty"><div class="icon">🔍</div><div>此篩選條件無資料</div></div>';
    return;
  }

  const container = document.getElementById('new-positions-list');
  container.innerHTML = '';

  // 找出雙訊號 tickers
  const trustTickers   = new Set(filtered.filter(d => d.source === '投信').map(d => d.ticker));
  const foreignTickers = new Set(filtered.filter(d => d.source === '外資').map(d => d.ticker));
  const bothTickers    = new Set([...trustTickers].filter(t => foreignTickers.has(t)));

  // 依 ticker 合併（雙訊號顯示一張卡）
  const merged = {};
  filtered.forEach(p => {
    const t = p.ticker;
    if (!merged[t]) {
      merged[t] = { ...p, sources: [p.source], all_funds: parseFunds(p.funds) };
    } else {
      if (!merged[t].sources.includes(p.source)) merged[t].sources.push(p.source);
      merged[t].all_funds = [...new Set([...merged[t].all_funds, ...parseFunds(p.funds)])];
      merged[t].fund_count = Math.max(merged[t].fund_count, p.fund_count);
    }
  });

  Object.values(merged).forEach(p => {
    const isBothSignal = bothTickers.has(p.ticker);
    const isForeign    = p.sources.includes('外資') && !isBothSignal;
    const isTrust      = p.sources.includes('投信') && !isBothSignal;

    const cardClass = isBothSignal ? 'both-signal' : isForeign ? 'foreign-acc' : 'trust-new';

    // Badge
    let badge = '';
    if (isBothSignal) {
      badge = '<span class="badge-both">🔥 雙訊號共振</span>';
    } else if (isForeign) {
      badge = '<span class="badge-foreign">🌏 外資連續買超</span>';
    } else {
      badge = '<span class="badge-new">📋 投信新建倉</span>';
    }

    // 數值
    const vmRaw = p.total_value || 0;
    const vmStr = isForeign
      ? (vmRaw >= 1000 ? (vmRaw / 1000).toFixed(1) + '千張' : vmRaw + ' 張')
      : (vmRaw >= 1000 ? (vmRaw / 1000).toFixed(1) + ' 億' : vmRaw + ' 千元');

    const fundCount = p.fund_count || 1;
    const fundsArr  = p.all_funds || [];
    const tagsHtml  = fundsArr.slice(0, 3).map(f =>
      '<span class="' + (isForeign ? 'tag-foreign' : 'tag-trust') + '">' + f + '</span>'
    ).join('') + (fundsArr.length > 3
      ? '<span class="tag-more">+' + (fundsArr.length - 3) + ' 家</span>' : '');

    // 狀態文字
    const statusText = isBothSignal
      ? '投信 + 外資同步進場，共振訊號強烈 💪'
      : isForeign
        ? '外資連續買超 ' + (p.buy_days || fundCount) + ' 日，持續觀察 👀'
        : fundCount >= 2
          ? '共 ' + fundCount + ' 檔基金同步新進場，共識強 💪'
          : '本月首次進入基金前十大，持續觀察 👀';

    // Progress fill class
    const fillClass = isBothSignal ? 'fill-both' : isForeign ? 'fill-foreign' : 'fill-trust';
    const fillPct   = Math.min(100, fundCount * 20 + 20) + '%';

    // 右側數值顯示
    const rightLabel = isForeign ? '買超張數' : (fundCount + ' 檔基金');

    const div = document.createElement('div');
    div.className = 'card ' + cardClass;
    div.innerHTML =
      '<div class="card-top">' +
        '<div>' +
          badge +
          '<div class="card-ticker" style="margin-top:6px">' + (p.ticker || '—') + '</div>' +
          '<div class="card-name">' + (p.name || '') + '</div>' +
        '</div>' +
        '<div class="card-value">' +
          '<div class="mv">' + vmStr + '</div>' +
          '<div class="qt">' + rightLabel + '</div>' +
          (p.avg_pct ? '<div class="qt">佔比 ' + parseFloat(p.avg_pct).toFixed(2) + '%</div>' : '') +
        '</div>' +
      '</div>' +
      '<div class="tags-row">' + tagsHtml + '</div>' +
      '<div class="progress-wrap">' +
        '<div class="progress-label">' +
          '<span>' + (isForeign ? '買超強度' : '基金共識') + '</span>' +
          '<span style="color:' + (isBothSignal ? 'var(--both-light)' : isForeign ? 'var(--foreign-light)' : 'var(--trust-light)') + '">' + statusText + '</span>' +
        '</div>' +
        '<div class="progress-bar"><div class="progress-fill ' + fillClass + '" style="width:' + fillPct + '"></div></div>' +
      '</div>';

    div.addEventListener('click', () => openDetail(p));
    container.appendChild(div);
  });
}

/* ══════════════════════════════════════════
   Tab 2：持股追蹤（依基金）
══════════════════════════════════════════ */
async function loadFundList() {
  const { data } = await sb
    .from('tw_fund_positions')
    .select('fund_id, fund_name, company')
    .order('fund_name');

  if (!data || !data.length) return;

  // 去重
  const seen = new Set();
  const funds = data.filter(f => {
    if (seen.has(f.fund_id)) return false;
    seen.add(f.fund_id);
    return true;
  });

  // Filter bar chips
  const bar = document.getElementById('fund-filter-bar');
  funds.slice(0, 20).forEach(f => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = (f.fund_name || f.fund_id).slice(0, 12);
    c.addEventListener('click', () => {
      document.querySelectorAll('#fund-filter-bar .chip').forEach(ch => ch.classList.remove('active'));
      c.classList.add('active');
      loadFundPositions(f.fund_id, f.fund_name);
    });
    bar.appendChild(c);
  });

  // Tab 3 fund list
  const list = document.getElementById('funds-list');
  list.innerHTML = '';
  funds.forEach(f => {
    const div = document.createElement('div');
    div.className = 'fund-row';
    div.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;">' +
        '<div>' +
          '<div style="font-size:14px;font-weight:600">' + (f.fund_name || f.fund_id) + '</div>' +
          '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + (f.company || '') + ' · 月更前十大持股</div>' +
        '</div>' +
        '<div style="font-size:18px;color:var(--muted)">→</div>' +
      '</div>';
    div.addEventListener('click', () => {
      loadFundPositions(f.fund_id, f.fund_name);
      switchTab('all');
    });
    list.appendChild(div);
  });
}

async function loadFundPositions(fundId, fundName) {
  switchTab('all');
  document.getElementById('all-positions-list').innerHTML = '<div class="loading">載入中...</div>';

  const { data } = await sb
    .from('tw_fund_positions')
    .select('*')
    .eq('fund_id', fundId)
    .order('year_month', { ascending: false })
    .order('rank')
    .limit(100);

  if (!data || !data.length) {
    document.getElementById('all-positions-list').innerHTML =
      '<div class="empty"><div class="icon">📭</div><div>暫無資料</div></div>';
    return;
  }

  const months = [...new Set(data.map(d => d.year_month))].sort().reverse();
  const latest = data.filter(d => d.year_month === months[0]);
  const ym = months[0];
  const ymLabel = ym ? ym.slice(0,4) + '/' + ym.slice(4,6) : '';

  const container = document.getElementById('all-positions-list');
  container.innerHTML =
    '<div class="section-title" style="margin-bottom:10px">' +
      (fundName || fundId) + ' — ' + ymLabel +
    '</div>';

  latest.forEach(p => {
    const vmStr = p.value_k
      ? p.value_k >= 100000
        ? (p.value_k / 100000).toFixed(2) + ' 億'
        : (p.value_k / 1000).toFixed(1) + ' 千萬'
      : '—';

    const div = document.createElement('div');
    div.className = 'card normal';
    div.innerHTML =
      '<div class="card-top">' +
        '<div>' +
          '<div style="font-size:15px;font-weight:600">' + p.ticker + '</div>' +
          '<div class="card-name">' + (p.name || '') + '</div>' +
        '</div>' +
        '<div class="card-value">' +
          '<div class="mv">' + vmStr + '</div>' +
          '<div class="qt">排名 #' + p.rank + '</div>' +
          '<div class="qt">佔淨值 ' + parseFloat(p.pct || 0).toFixed(2) + '%</div>' +
        '</div>' +
      '</div>';
    div.addEventListener('click', () => openDetail({ ticker: p.ticker, name: p.name, source: '投信' }));
    container.appendChild(div);
  });
}

/* ══════════════════════════════════════════
   Detail Panel（與 whale.html 一致）
══════════════════════════════════════════ */
window.openDetail = async function(p) {
  const existing = document.getElementById('detail-panel');
  if (existing) existing.remove();

  const ticker  = p.ticker || '';
  const name    = p.name || '';
  // 台股 TradingView 格式 TWSE:XXXX or TPEX:XXXX
  const tvSymbol = ticker.length <= 4 ? 'TWSE:' + ticker : ticker;
  const yahooSymbol = ticker + '.TW';

  const panel = document.createElement('div');
  panel.id = 'detail-panel';
  panel.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;';
  panel.innerHTML =
    '<div id="detail-inner" style="background:var(--bg2);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
        '<div>' +
          '<div style="font-size:22px;font-weight:700">' + ticker + '</div>' +
          '<div style="font-size:13px;color:var(--muted)">' + name + '</div>' +
        '</div>' +
        '<button onclick="document.getElementById(\'detail-panel\').remove()" style="background:var(--border);border:none;color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:14px">✕ 關閉</button>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">' +
        '<a href="diagnosis.html?ticker=' + ticker + '" style="flex:1;min-width:80px;background:#7c3aed;color:#fff;padding:10px;border-radius:10px;text-align:center;text-decoration:none;font-size:12px;font-weight:500">🔍 AI健診</a>' +
        '<a href="https://www.tradingview.com/chart/?symbol=' + tvSymbol + '" target="_blank" style="flex:1;min-width:80px;background:var(--teal);color:#fff;padding:10px;border-radius:10px;text-align:center;text-decoration:none;font-size:12px;font-weight:500">📈 TradingView</a>' +
        '<a href="https://finance.yahoo.com/quote/' + yahooSymbol + '" target="_blank" style="flex:1;min-width:80px;background:var(--amber);color:#fff;padding:10px;border-radius:10px;text-align:center;text-decoration:none;font-size:12px;font-weight:500">💹 Yahoo</a>' +
        '<button id="wl-btn" onclick="addToWatchlist(\'' + ticker + '\',\'' + name + '\')" style="flex:1;min-width:80px;background:var(--coral);color:#fff;border:none;padding:10px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:500">⭐ 觀察名單</button>' +
      '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">投信持股明細（最新月份）</div>' +
      '<div id="detail-holdings"><div style="color:var(--muted);font-size:13px;padding:10px 0">載入中...</div></div>' +
      '<div style="font-size:12px;color:var(--muted);margin:14px 0 8px;">外資近期動向</div>' +
      '<div id="detail-foreign"><div style="color:var(--muted);font-size:13px;padding:10px 0">載入中...</div></div>' +
    '</div>';

  panel.addEventListener('click', e => { if (e.target === panel) panel.remove(); });
  document.body.appendChild(panel);

  // ── 投信持股明細 ──
  try {
    const months2 = await getLatestMonth();
    const { data: hData } = await sb
      .from('tw_fund_positions')
      .select('fund_name, rank, shares, value_k, pct')
      .eq('ticker', ticker)
      .eq('year_month', months2)
      .order('pct', { ascending: false });

    if (hData && hData.length) {
      document.getElementById('detail-holdings').innerHTML = hData.map(d => {
        const vmStr = d.value_k
          ? d.value_k >= 100000 ? (d.value_k/100000).toFixed(2)+' 億' : (d.value_k/1000).toFixed(1)+' 千萬'
          : '—';
        return '<div style="padding:10px 0;border-bottom:1px solid var(--border);">' +
          '<div style="display:flex;justify-content:space-between;">' +
            '<div style="font-size:13px;font-weight:500">📋 ' + (d.fund_name || '') + '</div>' +
            '<div style="font-size:12px;color:var(--trust-light);font-weight:600">' + vmStr + '</div>' +
          '</div>' +
          '<div style="display:flex;gap:12px;margin-top:4px;">' +
            '<span style="font-size:11px;color:var(--muted)">排名：#' + d.rank + '</span>' +
            '<span style="font-size:11px;color:var(--muted)">佔淨值：' + parseFloat(d.pct||0).toFixed(2) + '%</span>' +
          '</div>' +
        '</div>';
      }).join('');
    } else {
      document.getElementById('detail-holdings').innerHTML =
        '<div style="color:var(--muted);font-size:13px;padding:10px 0">本月無投信前十大持股資料</div>';
    }
  } catch(e) {
    document.getElementById('detail-holdings').innerHTML =
      '<div style="color:var(--muted);font-size:13px;padding:10px 0">載入失敗</div>';
  }

  // ── 外資近期買賣超 ──
  try {
    const cutoff = getDateNDaysAgo(15);
    const { data: fData } = await sb
      .from('tw_institutional')
      .select('date, foreign_net, trust_net, total_net')
      .eq('ticker', ticker)
      .gte('date', cutoff)
      .order('date', { ascending: false })
      .limit(10);

    if (fData && fData.length) {
      const totalForeignNet = fData.reduce((s, d) => s + (d.foreign_net || 0), 0);
      const buyDays = fData.filter(d => d.foreign_net > 0).length;
      document.getElementById('detail-foreign').innerHTML =
        '<div style="display:flex;gap:8px;margin-bottom:10px;">' +
          '<div style="flex:1;background:var(--bg3);border-radius:8px;padding:8px;text-align:center;">' +
            '<div style="font-size:16px;font-weight:700;color:' + (totalForeignNet>0?'var(--teal-light)':'var(--red)') + '">' +
              (totalForeignNet > 0 ? '+' : '') + totalForeignNet.toLocaleString() + '</div>' +
            '<div style="font-size:10px;color:var(--muted);margin-top:2px">近期累計買賣超（張）</div>' +
          '</div>' +
          '<div style="flex:1;background:var(--bg3);border-radius:8px;padding:8px;text-align:center;">' +
            '<div style="font-size:16px;font-weight:700;color:var(--amber-light)">' + buyDays + '/' + fData.length + '</div>' +
            '<div style="font-size:10px;color:var(--muted);margin-top:2px">買超天數</div>' +
          '</div>' +
        '</div>' +
        fData.map(d => {
          const net = d.foreign_net || 0;
          const color = net > 0 ? 'var(--teal-light)' : net < 0 ? 'var(--red)' : 'var(--muted)';
          const sign  = net > 0 ? '+' : '';
          return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">' +
            '<span style="font-size:12px;color:var(--muted)">' + formatDate(d.date) + '</span>' +
            '<span style="font-size:12px;font-weight:600;color:' + color + '">' + sign + net.toLocaleString() + ' 張</span>' +
          '</div>';
        }).join('');
    } else {
      document.getElementById('detail-foreign').innerHTML =
        '<div style="color:var(--muted);font-size:13px;padding:10px 0">無外資近期資料</div>';
    }
  } catch(e) {
    document.getElementById('detail-foreign').innerHTML =
      '<div style="color:var(--muted);font-size:13px;padding:10px 0">載入失敗</div>';
  }
};

/* ══════════════════════════════════════════
   加入觀察名單
══════════════════════════════════════════ */
window.addToWatchlist = async function(ticker, name) {
  const btn = document.getElementById('wl-btn');
  if (btn) btn.disabled = true;
  const user = (await sb.auth.getUser()).data.user;
  if (!user) { alert('請先登入'); if (btn) btn.disabled = false; return; }
  const { error } = await sb.from('watchlist').upsert({
    user_id: user.id,
    symbol: ticker,
    market: 'tw',
    name: name,
    added_at: new Date().toISOString()
  }, { onConflict: 'user_id,symbol' });
  if (error) { alert('儲存失敗'); if (btn) btn.disabled = false; }
  else { if (btn) { btn.textContent = '✅ 已加入'; btn.style.background = 'var(--green)'; } }
};

/* ══════════════════════════════════════════
   工具函式
══════════════════════════════════════════ */
function parseFunds(raw) {
  if (!raw) return [];
  try { return JSON.parse(raw); } catch(e) { return []; }
}

async function getLatestMonth() {
  const { data } = await sb
    .from('tw_fund_positions')
    .select('year_month')
    .order('year_month', { ascending: false })
    .limit(1);
  return data && data.length ? data[0].year_month : '';
}

function getDateNDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}

function formatDate(d) {
  if (!d || d.length < 8) return d;
  return d.slice(0,4) + '/' + d.slice(4,6) + '/' + d.slice(6,8);
}

// 板塊分類（依股票代號範圍粗分，可日後補充 sector 欄位）
function isTech(p)   { const t = parseInt(p.ticker); return t >= 2300 && t <= 3699; }
function isFin(p)    { const t = parseInt(p.ticker); return t >= 2800 && t <= 2899; }
function isBio(p)    { const t = parseInt(p.ticker); return t >= 4100 && t <= 4999; }
function isTrad(p)   { const t = parseInt(p.ticker); return t >= 1000 && t <= 2299; }

   Init
══════════════════════════════════════════ */
async function init() {
  await Promise.all([loadNewPositions(), loadFundList()]);
}
init();
