<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>交易大師 · AI 股票健診</title>
<link rel="manifest" href="manifest.json">

<style>
  .mkt-grp { display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:12px; width:fit-content; }
  .mbt { background:transparent; border:none; color:var(--muted); font-family:'Noto Sans TC',sans-serif; font-size:13px; padding:9px 18px; cursor:pointer; transition:all .2s; }
  .mbt.active { background:var(--accent); color:#000; font-weight:700; }
  .mbt:hover:not(.active) { color:var(--accent); }
  .mono-inp { flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:8px; color:#fff; font-family:'Share Tech Mono',monospace; font-size:16px; letter-spacing:2px; padding:10px 14px; outline:none; transition:all .2s; }
  .mono-inp::placeholder { color:var(--muted); font-size:12px; letter-spacing:1px; font-family:'Noto Sans TC',sans-serif; }
  .mono-inp:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,212,255,.15); }
  .res-card { display:none; }
  .res-card.show { display:block; animation:fadeUp .35s ease; }
  .res-header { padding:16px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; }
  .sid { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:3px; color:#fff; line-height:1; }
  .sname { font-size:11px; color:var(--muted); margin-top:2px; }
  .metrics-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:1px; background:var(--border); }
  .met { background:var(--panel2); padding:12px 14px; }
  .met-l { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
  .met-v { font-family:'Share Tech Mono',monospace; font-size:17px; color:#fff; }
  .met-v.up { color:var(--green); } .met-v.dn { color:var(--red); } .met-v.yw { color:var(--warn); }
  .met-s { font-size:10px; color:var(--muted); margin-top:2px; }
  .analysis-section { padding:16px 18px; }
  .signal-list { display:flex; flex-direction:column; gap:8px; margin-bottom:18px; }
  .sig { display:flex; align-items:flex-start; gap:9px; font-size:13px; line-height:1.5; }
  .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .dot.bull { background:var(--green); box-shadow:0 0 6px var(--green); }
  .dot.bear { background:var(--red); box-shadow:0 0 6px var(--red); }
  .dot.neutral { background:var(--warn); box-shadow:0 0 6px var(--warn); }
  .ai-text { font-size:13px; line-height:1.85; color:var(--text); }
  .ai-section { margin-bottom:20px; padding:14px; background:rgba(255,255,255,.02); border-radius:10px; border-left:3px solid var(--accent); }
  .ai-section-title { color:var(--accent); font-weight:700; font-size:13px; letter-spacing:1px; margin-bottom:8px; display:block; }
  .ai-section-body { line-height:1.9; color:var(--text); font-size:13px; }
  .res-foot { padding:10px 18px; background:rgba(0,0,0,.3); border-top:1px solid var(--border); font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px; }
  .pts-bar { background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(155,89,182,.06)); border:1px solid rgba(0,212,255,.2); border-radius:10px; padding:10px 16px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>

<div class="page-wrap">
  <div class="pts-bar">
    <div style="font-size:13px">💎 剩餘點數</div>
    <div id="pts-display" style="font-family:Share Tech Mono,monospace;font-size:16px;color:var(--accent)">— 點</div>
  </div>

  <div class="sec-head">🔍 AI 股票健診</div>
  <div class="card" style="padding:18px;margin-bottom:16px">
    <div class="mkt-grp">
      <button class="mbt active" id="mbt-tw" onclick="setMkt('tw')">🇹🇼 台股</button>
      <button class="mbt" id="mbt-us" onclick="setMkt('us')">🇺🇸 美股</button>
    </div>
    <div style="display:flex;gap:8px">
      <input class="mono-inp" id="stock-inp" placeholder="輸入股票代號，如 2330 或 NVDA" onkeydown="if(event.key==='Enter')analyze()"/>

    <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.8">
      ⚠️ 請輸入股票代號（數字或英文），不支援中文名稱搜尋<br>
      📋 查詢台股代號：
      <a href="https://www.twse.com.tw/zh/products/code/query.html" target="_blank" style="color:var(--accent)">證券編碼查詢</a>　
      <a href="https://isin.twse.com.tw/isin/C_public.jsp?strMode=2" target="_blank" style="color:var(--accent)">上市上櫃代號一覽表</a>　
      <a href="https://www.wantgoo.com/index/overview" target="_blank" style="color:var(--accent)">玩股網</a>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
      <span style="font-size:10px;color:var(--muted);align-self:center">熱門</span>
      <span class="chip" onclick="quickPick('2330','tw')">2330 台積電</span>
      <span class="chip" onclick="quickPick('2317','tw')">2317 鴻海</span>
      <span class="chip" onclick="quickPick('0050','tw')">0050</span>
      <span class="chip" onclick="quickPick('NVDA','us')">NVDA</span>
      <span class="chip" onclick="quickPick('AAPL','us')">AAPL</span>

  <div class="spinner-wrap" id="loading" style="display:none">

  <div id="err-box" style="display:none;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);border-radius:10px;padding:14px 18px;color:var(--red);font-size:13px;margin-bottom:16px;text-align:center"></div>

  <div class="card res-card" id="res-card">
    <div class="res-header">
      <div>
        <div class="sid" id="r-id"></div>
        <div class="sname" id="r-name"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div id="r-ring"></div>
        <div id="r-grade" class="grade g-hold"></div>
      </div>
    </div>
    <div class="metrics-grid" id="r-metrics"></div>
    <div class="analysis-section">
      <div class="sec-head">📡 關鍵信號</div>
      <div class="signal-list" id="r-signals"></div>
      <div class="sec-head">🧠 AI 深度分析</div>
      <div class="ai-text" id="r-analysis"></div>
      <div style="margin-top:14px">
        <button class="btn btn-green btn-sm" id="save-btn" onclick="saveToWatchlist()">＋ 加入觀察名單</button>
      </div>
    </div>
    <div class="res-foot">
      <span id="r-time"></span>
      <span>⚠ 僅供參考，不構成投資建議</span>
    </div>
  </div>
</div>

<script>
let currentUser = null, currentProfile = null, currentMkt = 'tw', lastResult = null;

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  currentProfile = await getProfile(currentUser.id);
  if (!currentProfile) {
    await sb.from('profiles').insert({ id: currentUser.id, display_name: currentUser.user_metadata?.display_name || currentUser.email.split('@')[0], plan: 'free', daily_count: 0, last_date: new Date().toDateString() }).then(() => {}).catch(() => {});
    currentProfile = await getProfile(currentUser.id);
  }
  const nb = document.getElementById('nav-plan');
  nb.textContent = planLabel(currentProfile?.plan || 'free');
  nb.className = 'plan-badge ' + planBadge(currentProfile?.plan || 'free');
  const pts = await getPoints(currentUser.id);
  document.getElementById('pts-display').textContent = pts + ' 點';
  // 從 DB 同步 Groq Key 到 localStorage
  await getAIKeyFromDB(currentUser.id);
})();

function setMkt(m) {
  currentMkt = m;
  document.getElementById('mbt-tw').classList.toggle('active', m==='tw');
  document.getElementById('mbt-us').classList.toggle('active', m==='us');
}
function quickPick(sym, mkt) { setMkt(mkt); document.getElementById('stock-inp').value = sym; analyze(); }

function toggleLoad(on){
  document.getElementById('loading').style.display = on ? 'block' : 'none';
  document.getElementById('analyze-btn').disabled = on;
}
function showErr(msg){ const e=document.getElementById('err-box'); e.textContent=msg; e.style.display='block'; }
function hideErr(){ document.getElementById('err-box').style.display='none'; }
  
async function analyze() {
  const sym = document.getElementById('stock-inp').value.trim().toUpperCase();
  // 只接受數字和英文
  if (!/^[A-Z0-9.\-]+$/.test(sym)) {
    showErr('請輸入股票代號（數字或英文），如 2330 或 NVDA，不支援中文名稱');
    return;
  }
  if (!sym) return;
  if (currentProfile?.plan === 'free') { showErr('此功能需要開通會員才能使用，請聯繫管理員開通。'); return; }
  const pts = await getPoints(currentUser.id);
  toggleLoad(true);
  document.getElementById('res-card').classList.remove('show');
  hideErr();

  let livePrice = null, priceContext = '';
  try {
    let pd = null;
    if (currentMkt === 'tw') {
      // 台股用 Railway 後端抓，自動判斷上市/上櫃
      try {
        const r = await fetch('https://splendid-prosperity-production-41ab.up.railway.app/quote?symbol=' + sym, {signal: AbortSignal.timeout(8000)});
        const data = await r.json();
        if (data.price) {
          pd = {chart:{result:[{meta:{regularMarketPrice:data.price,symbol:data.symbol,currency:data.currency,shortName:data.name||data.symbol},indicators:{quote:[{close:data.closes}]}}]}};
        }
      } catch(e) {}
    } else {
      // 美股用 Yahoo proxy
      async function tryFetchYahoo(symbol) {
        const url = "https://query2.finance.yahoo.com/v8/finance/chart/" + symbol + "?interval=1d&range=3mo";
        const proxies = [
          "https://corsproxy.io/?" + encodeURIComponent(url),
          "https://api.allorigins.win/get?url=" + encodeURIComponent(url),
          "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url),
          "https://thingproxy.freeboard.io/fetch/" + encodeURIComponent(url),
        ];
        for (const proxyUrl of proxies) {
          try {
            const r = await fetch(proxyUrl, {signal: AbortSignal.timeout(5000)});
            const raw = await r.json();
            const pd = raw?.contents ? JSON.parse(raw.contents) : raw;
            const result = pd?.chart?.result?.[0];
            if (result?.meta?.regularMarketPrice) return pd;
          } catch(e2) { continue; }
        }
        return null;
      }
      pd = await tryFetchYahoo(sym);
    }
    const result = pd?.chart?.result?.[0];
    const meta = result?.meta;
    const closes = result?.indicators?.quote?.[0]?.close || [];
    const highs = result?.indicators?.quote?.[0]?.high || [];
    const lows = result?.indicators?.quote?.[0]?.low || [];
    const volumes = result?.indicators?.quote?.[0]?.volume || [];
    if (meta?.regularMarketPrice && closes.length > 0) {
      const validCloses = closes.filter(c => c != null);
      const ma = (arr, n) => { if (arr.length < n) return null; const s = arr.slice(-n).filter(v=>v!=null); return (s.reduce((a,b)=>a+b,0)/s.length).toFixed(2); };
      const ma5=ma(validCloses,5), ma20=ma(validCloses,20), ma60=ma(validCloses,60);
      const calcRSI = (arr,p=14) => { if(arr.length<p+1)return null; const s=arr.slice(-(p+1)).filter(v=>v!=null); let g=0,l=0; for(let i=1;i<s.length;i++){const d=s[i]-s[i-1];if(d>0)g+=d;else l-=d;} const ag=g/p,al=l/p; if(al===0)return 100; return(100-100/(1+ag/al)).toFixed(1); };
      const rsi=calcRSI(validCloses);
      const ema=(arr,n)=>{const k=2/(n+1);let e=arr[0];for(let i=1;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;};
      const validC=validCloses.filter(v=>v!=null);
      let macd=null;
      if(validC.length>=26){const e12=ema(validC.slice(-26),12),e26=ema(validC,26);macd=(e12-e26).toFixed(3);}
      // 短線（5日）
      const r5h=highs.slice(-5).filter(v=>v!=null), r5l=lows.slice(-5).filter(v=>v!=null);
      const support_s=r5l.length?Math.min(...r5l).toFixed(2):null;
      const resistance_s=r5h.length?Math.max(...r5h).toFixed(2):null;
      // 中線（20日）
      const r20h=highs.slice(-20).filter(v=>v!=null), r20l=lows.slice(-20).filter(v=>v!=null);
      const support=r20l.length?Math.min(...r20l).toFixed(2):null;
      const resistance=r20h.length?Math.max(...r20h).toFixed(2):null;
      // 長線（60日）
      const r60h=highs.slice(-60).filter(v=>v!=null), r60l=lows.slice(-60).filter(v=>v!=null);
      const support_l=r60l.length?Math.min(...r60l).toFixed(2):null;
      const resistance_l=r60h.length?Math.max(...r60h).toFixed(2):null;
      const today=new Date(); const dateStr=today.getFullYear()+"年"+(today.getMonth()+1)+"月"+today.getDate()+"日";
      livePrice = { name:meta.shortName||meta.longName||sym, price:meta.regularMarketPrice, high:meta.regularMarketDayHigh, low:meta.regularMarketDayLow, prev:meta.previousClose, changePct:(((meta.regularMarketPrice-meta.previousClose)/meta.previousClose)*100).toFixed(2), ma5,ma20,ma60,rsi,macd,support,resistance,support_s,resistance_s,support_l,resistance_l,date:dateStr };
      priceContext = "\n\n[即時技術分析資料 "+dateStr+"]\n公司名稱: "+livePrice.name+"\n目前股價: "+livePrice.price+"\n漲跌幅: "+livePrice.changePct+"%\nMA5: "+(ma5||'N/A')+" MA20: "+(ma20||'N/A')+" MA60: "+(ma60||'N/A')+"\nRSI(14): "+(rsi||'N/A')+"\nMACD: "+(macd||'N/A')+"\n短線支撐: "+(support_s||'N/A')+" 短線壓力: "+(resistance_s||'N/A')+"\n中線支撐: "+(support||'N/A')+" 中線壓力: "+(resistance||'N/A')+"\n長線支撐: "+(support_l||'N/A')+" 長線壓力: "+(resistance_l||'N/A')+"\n[請根據以上真實技術指標進行分析]";
    }
  } catch(e) { console.log('股價抓取失敗', e); }

  const market = currentMkt === 'tw' ? '台灣股市(台股)' : '美國股市(美股)';
  const companyHint = livePrice?.name ? "公司名稱是" + livePrice.name + "，" : "";

  // 技術指標解讀
  const rsiVal = parseFloat(livePrice?.rsi || 50);
  const rsiNote = rsiVal >= 70 ? "超買警戒" : rsiVal >= 60 ? "偏強" : rsiVal <= 30 ? "超賣反彈機會" : rsiVal <= 40 ? "偏弱" : "中性";
  const maStatus = (livePrice?.ma5 && livePrice?.ma20) ?
    (parseFloat(livePrice.ma5) > parseFloat(livePrice.ma20) ? "MA5上穿MA20黃金交叉" : "MA5下穿MA20死亡交叉") : "";
  const macdNote = livePrice?.macd ? (parseFloat(livePrice.macd) > 0 ? "MACD正值偏多" : "MACD負值偏空") : "";

  const prompt = "你是頂級股票分析師，擁有20年實戰經驗。" + companyHint + "請對" + market + "股票代號「" + sym + "」進行專業分析。" + priceContext +
    "\n\n技術指標解讀：RSI=" + (livePrice?.rsi||'N/A') + "(" + rsiNote + ")，" + maStatus + "，" + macdNote +
    "\n\n請輸出純JSON，格式如下（禁止使用markdown）：" +
    "{" +
    "\"stockName\":\"公司全名\"," +
    "\"sector\":\"產業別\"," +
    "\"healthScore\":75," +
    "\"grade\":\"強力買進\"," +
    "\"trend\":\"上升\"," +
    "\"peRatio\":\"估計PE\"," +
    "\"support\":\"支撐位\"," +
    "\"resistance\":\"壓力位\"," +
    "\"signals\":[" +
    "{\"type\":\"bull\",\"text\":\"具體多頭信號，必須包含實際數字，如：RSI65突破、MA5(182)站上MA20(175)、成交量放大30%\"}," +
    "{\"type\":\"bear\",\"text\":\"具體空頭風險，必須包含實際數字或事件\"}," +
    "{\"type\":\"neutral\",\"text\":\"中性觀察，包含產業動態或籌碼面\"}]," +
    "\"analysis\":\"【基本面】公司核心業務、營收獲利趨勢、本益比估值（必須有具體數字）。【技術面】根據提供的RSI/MACD/MA數據詳細解析目前趨勢，不可重複關鍵信號內容。【產業鏈】上下游影響、競爭對手動態、產業景氣位置。【催化劑與風險】近期重要事件（財報/法說/產品）、法人籌碼動向、3項具體風險。【操作策略】建議進場區間、短線目標價、停損位置。以上共700字以上，每段都要有具體數字支撐，禁止籠統描述。\"" +
    "}" +
    "\ngrade必須是：強力買進、買進、谷底反彈機會、觀察等待、持有、減碼、避開之一";

  try {
    const raw = await callAI(prompt, 2500);
    const clean = raw.replace(/```json|```/g, '').trim();
    let obj;
    try { obj = JSON.parse(clean); } catch(e) { const m=clean.match(/\{[\s\S]*\}/); obj=JSON.parse(m[0]); }
    if (livePrice?.price) { obj.currentPrice=livePrice.price; obj.changePct=livePrice.changePct; obj.stockName=livePrice.name; obj.support_s=livePrice.support_s; obj.resistance_s=livePrice.resistance_s; obj.support=livePrice.support; obj.resistance=livePrice.resistance; obj.support_l=livePrice.support_l; obj.resistance_l=livePrice.resistance_l; }
    lastResult = {...obj, symbol:sym, market:currentMkt};
    await deductPoint(currentUser.id, "AI 健診："+sym);
    const newPts = await getPoints(currentUser.id);
    document.getElementById('pts-display').textContent = newPts + ' 點';
    renderResult(sym, obj);
  } catch(e) { showErr('分析失敗：' + e.message); }
  toggleLoad(false);
}

function renderResult(sym, d) {
  document.getElementById('r-id').textContent = sym;
  document.getElementById('r-name').textContent = (d.stockName||'') + (d.sector ? ' · '+d.sector : '');
  const score=parseInt(d.healthScore)||50;
  const color=score>=75?'#2ecc71':score>=50?'#00d4ff':score>=35?'#f39c12':'#e74c3c';
  const r=34,circ=2*Math.PI*r,dash=(score/100)*circ;
  document.getElementById('r-ring').innerHTML = '<svg width="84" height="84" viewBox="0 0 84 84"><circle cx="42" cy="42" r="'+r+'" fill="none" stroke="#1c2d50" stroke-width="6"/><circle cx="42" cy="42" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="6" stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="'+circ/4+'" stroke-linecap="round" style="filter:drop-shadow(0 0 6px '+color+')"/><text x="42" y="44" text-anchor="middle" dominant-baseline="middle" font-size="20" fill="white" font-family="Bebas Neue">'+score+'</text><text x="42" y="57" text-anchor="middle" font-family="Share Tech Mono" font-size="7" fill="#4a6080">HEALTH</text></svg>';
  const grade=d.grade||'—';
  const gEl=document.getElementById('r-grade');
  gEl.textContent=grade;
  gEl.className='grade '+gradeClass(grade);
  const mets=[
    {l:'趨勢',v:d.trend||'—',c:d.trend?.includes('上')?'up':d.trend?.includes('下')?'dn':''},
    {l:d.currentPrice?'即時股價':'本益比',v:d.currentPrice?String(d.currentPrice):(d.peRatio||'—'),c:d.changePct>0?'up':d.changePct<0?'dn':'',s:d.currentPrice?(d.changePct>0?'▲':'▼')+d.changePct+'%':'估計值'},
    {l:'短線支撐',v:d.support_s||d.support||'—',c:'up',s:'5日'},
    {l:'短線壓力',v:d.resistance_s||d.resistance||'—',c:'dn',s:'5日'},
    {l:'中線支撐',v:d.support||'—',c:'up',s:'20日'},
    {l:'中線壓力',v:d.resistance||'—',c:'dn',s:'20日'},
    {l:'長線支撐',v:d.support_l||'—',c:'up',s:'60日'},
    {l:'長線壓力',v:d.resistance_l||'—',c:'dn',s:'60日'},
  ];
  document.getElementById('r-metrics').innerHTML=mets.map(m=>'<div class="met"><div class="met-l">'+m.l+'</div><div class="met-v '+m.c+'">'+m.v+'</div>'+(m.s?'<div class="met-s">'+m.s+'</div>':'')+'</div>').join('');
  document.getElementById('r-signals').innerHTML=(d.signals||[]).map(s=>'<div class="sig"><div class="dot '+s.type+'"></div><span>'+s.text+'</span></div>').join('');
  const analysisText = d.analysis || '';
  const sections = analysisText.split(/(?=\u3010)/);
  let analysisHtml = '';
  sections.forEach(function(s) {
    const titleMatch = s.match(/^\u3010(.+?)\u3011/);
    if (titleMatch) {
      const title = titleMatch[0];
      const body = s.replace(title, '').trim();
      analysisHtml += '<div class="ai-section"><span class="ai-section-title">' + title + '</span><div class="ai-section-body">' + body + '</div></div>';
    } else if (s.trim()) {
      analysisHtml += '<div class="ai-section"><div class="ai-section-body">' + s + '</div></div>';
    }
  });
  document.getElementById('r-analysis').innerHTML = analysisHtml;
  document.getElementById('r-time').textContent='診斷：'+new Date().toLocaleString('zh-TW');
  document.getElementById('res-card').classList.add('show');
  document.getElementById('res-card').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function gradeClass(g) {
  if(g.includes('強力買進')||g.includes('買進'))return 'g-buy';
  if(g.includes('谷底'))return 'g-rebound';
  if(g.includes('觀察'))return 'g-watch';
  if(g.includes('持有'))return 'g-hold';
  return 'g-avoid';
}

async function saveToWatchlist() {
  if (!lastResult) return;
  const btn=document.getElementById('save-btn'); btn.disabled=true;
  const {error}=await sb.from('watchlist').upsert({user_id:currentUser.id,symbol:lastResult.symbol,market:lastResult.market,name:lastResult.stockName,sector:lastResult.sector,grade:lastResult.grade,health_score:lastResult.healthScore,added_at:new Date().toISOString()},{onConflict:'user_id,symbol'});
  if(error){showToast('❌ 儲存失敗','error');btn.disabled=false;}
  else{showToast('✅ 已加入觀察名單','success');}
}

(function(){
  const urlParams = new URLSearchParams(window.location.search);
  const ticker = urlParams.get('ticker');
  const market = urlParams.get('market');
  if(ticker){
    const inp = document.getElementById('stock-inp');
    if(inp){
      inp.value = ticker;
      // 依 market 參數決定切換哪個市場，預設美股
      if(market === 'tw'){
        const twBt = document.getElementById('mbt-tw');
        if(twBt) twBt.click();
      } else {
        const usBt = document.getElementById('mbt-us');
        if(usBt) usBt.click();
      }
      const btn = document.getElementById('analyze-btn');
      if(btn) setTimeout(()=>btn.click(), 800);
    }
  }
})();
</script>
